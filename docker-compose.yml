# Docker Compose for local development

version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: zoho_erp_db
    environment:
      POSTGRES_USER: zoho_user
      POSTGRES_PASSWORD: zoho_password
      POSTGRES_DB: zoho_erp_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zoho_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zoho_erp_cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
